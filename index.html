<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tudo's Links</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style type="text/css">
        body{
            background: linear-gradient(to right, #93cb11, #25c6fc);
            font-family: 'Roboto', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        @keyframes floatAnimation {
            0%, 100% { transform: translateY(5px); }
            50% { transform: translateY(-5px); }
        }
        h1 {
            text-align: center;
            color: white;
            font-size: 24px;
            animation: floatAnimation 2s ease-in-out infinite;
        }
        .container {
            width: 100%;
            max-width: 320px;
        }
        .button {
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: linear-gradient(to right, #fe00ad, #a6cb11);
            padding: 12px 20px;
            border-radius: 20px; /*靈魂*/
            text-decoration: none;
            font-weight: 500;
            margin-bottom: 10px;
            box-shadow: 0px 8px 15px rgba(0,0,0,0.1);
        }
        .button:hover {
            background-color: #f2f2f2;
            transform: translateY(-2px);
        }
        .button img {
            margin-right: 10px;
            width: 24px;
            height: 24px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Tudo's Linktree</h1>
        <a href="https://hackmd.io/@Tudohuang" class="button">
            <img src="https://avatars.githubusercontent.com/u/13574138?s=200&v=4" alt="HackMD Icon">
            知識的殿堂HackMD
        </a>
        <a href="https://github.com/tudohuang" class="button">
            <img src="https://tudohuang.github.io/tudoweb/github.svg" alt="GitHub Icon">
            開源聖地GitHub
        </a>
        <a href="https://huggingface.co/Tudohuang" class="button">
            <img src="https://tudohuang.github.io/tudoweb/hug.svg" alt="HuggingFace Icon">
            AI之家HuggingFace
        </a>
        <a href="https://discord.com" class="button">
            <img src="https://tudohuang.github.io/tudoweb/dc.svg" alt="Discord Icon">
            社交網路Discord, ID: tudo
        </a>
        <a href="mailto:tudohuang@gmail.com" class="button">
            ✉️ Email
        </a>
    </div>
</body>
</html>
